<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Smart To-Do Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f7fb;
            transition:0.3s;
        }

        .dark-mode{
            background:#121212;
            color:white;
        }

        .dark-mode .card{
            background:#1e1e1e;
            color:white;
        }

        .dark-mode .list-group-item{
            background:#1e1e1e;
            color:white;
        }

        .container-box{
            max-width:850px;
            margin:auto;
            margin-top:40px;
        }

        .task-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .buttons{
            display:flex;
            gap:8px;
        }

        .completed{
            text-decoration:line-through;
            color:gray;
        }

        .priority-high{
            color:#dc3545;
            font-weight:bold;
        }

        .priority-medium{
            color:#fd7e14;
            font-weight:bold;
        }

        .priority-low{
            color:#198754;
            font-weight:bold;
        }

    </style>

</head>

<body id="body">

<div class="container container-box">

    <div class="card shadow-lg p-4">

        <!-- HEADER -->

        <div class="d-flex justify-content-between mb-3">

            <h3>🚀 Smart To-Do Manager</h3>

            <button onclick="toggleDark()" class="btn btn-dark">
                🌙 Dark Mode
            </button>

        </div>

        <!-- DASHBOARD -->

        <div class="row text-center mb-4">

            <div class="col">
                <h6>Total</h6>
                <h4 th:text="${total}"></h4>
            </div>

            <div class="col">
                <h6>Completed</h6>
                <h4 th:text="${completed}"></h4>
            </div>

            <div class="col">
                <h6>Pending</h6>
                <h4 th:text="${total-completed}"></h4>
            </div>

        </div>

        <!-- SEARCH -->

        <input id="searchBox" class="form-control mb-3" placeholder="🔍 Search task">

        <!-- ADD TASK -->

        <form action="/addTask" method="post" class="mb-4">

            <div class="row g-2">

                <div class="col-md-3">
                    <input type="text" name="task" class="form-control" placeholder="Task" required>
                </div>

                <div class="col-md-3">
                    <select name="category" class="form-control">
                        <option value="Study">Study</option>
                        <option value="Work">Work</option>
                        <option value="Personal">Personal</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <select name="priority" class="form-control">
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <input type="date" name="dueDate" class="form-control">
                </div>

                <div class="col-md-2">
                    <button class="btn btn-primary w-100">
                        Add Task
                    </button>
                </div>

            </div>

        </form>

        <!-- TASK LIST -->

        <ul class="list-group" id="taskList">

            <li class="list-group-item task-item"
                th:each="task : ${tasks}">

                <div>

                    <!-- Task Name -->
                    <strong th:text="${task.task}"></strong>

                    <br>

                    <small>

                        Category:
                        <span th:text="${task.category}"></span>

                        |

                        Priority:
                        <span th:text="${task.priority}"></span>

                        |

                        Due:
                        <span th:text="${task.dueDate}"></span>

                    </small>

                </div>

                <div class="buttons">

                    <form th:action="@{/update/{id}(id=${task.id})}" method="post">

                        <input type="hidden" name="task" th:value="${task.task}">

                        <button class="btn btn-primary btn-sm">
                            Update
                        </button>

                    </form>

                    <a th:href="@{/toggle/{id}(id=${task.id})}"
                       class="btn btn-warning btn-sm">
                        ✔
                    </a>

                    <a th:href="@{/delete/{id}(id=${task.id})}"
                       class="btn btn-danger btn-sm">
                        Delete
                    </a>

                </div>

            </li>

        </ul>

    </div>

</div>

<script>

    function toggleDark(){

        let body=document.getElementById("body");

        body.classList.toggle("dark-mode");

        if(body.classList.contains("dark-mode")){
            localStorage.setItem("darkmode","on");
        }else{
            localStorage.setItem("darkmode","off");
        }

    }

    window.onload=function(){

        if(localStorage.getItem("darkmode")==="on"){
            document.getElementById("body").classList.add("dark-mode");
        }

    }

    document.getElementById("searchBox").addEventListener("keyup",function(){

        let filter=this.value.toLowerCase();

        let tasks=document.querySelectorAll("#taskList li");

        tasks.forEach(t=>{

            let text=t.innerText.toLowerCase();

            t.style.display=text.includes(filter)?"":"none";

        });

    });

</script>

</body>
</html>
